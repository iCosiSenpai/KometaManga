services:
  kometamanga:
    image: ghcr.io/icosisenpai/kometamanga:latest
    # build: .  # uncomment to build from source instead of pulling
    container_name: kometamanga
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      - ./config:/config
      # ── Library folders ──
      # Use the same host paths and mount points as Komga so both containers
      # see the same /data tree. Komga's default root is /data.
      #
      # Example — if your Komga compose has:
      #   volumes:
      #     - /share/manga:/data/manga
      #     - /share/webtoon:/data/webtoon
      #
      # Then mirror those same mounts here:
      - /path/to/manga:/data/manga
      # - /path/to/webtoon:/data/webtoon
      # - /path/to/light-novels:/data/light-novels
    environment:
      - KOMF_CONFIG_DIR=/config
      - JAVA_TOOL_OPTIONS=-Xmx512m
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '2.0'
    networks:
      - kometahub

networks:
  kometahub:
    external: true
